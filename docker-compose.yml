version: '3.8'

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount data directory for persistence
      - ./:/data
      # Mount logs
      - ./logs:/var/log/openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_PORT=8080
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    networks:
      - openclaw-network
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - openclaw-network
    depends_on:
      - openclaw

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: openclaw-telegram-bot
    restart: unless-stopped
    volumes:
      - ./telegram-config.json:/app/telegram-config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    networks:
      - openclaw-network
    depends_on:
      - openclaw
      - ollama
    environment:
      - TZ=Asia/Tokyo
    command: python telegram-bot.py

  telegram-monitor:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: openclaw-telegram-monitor
    restart: unless-stopped
    volumes:
      - ./telegram-config.json:/app/telegram-config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    networks:
      - openclaw-network
    depends_on:
      - openclaw
      - ollama
    environment:
      - TZ=Asia/Tokyo
    command: python telegram-notify.py

volumes:
  ollama-data:
    driver: local

networks:
  openclaw-network:
    driver: bridge
